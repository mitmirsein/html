<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계시(Revelation) 인터랙티브 지형도</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans KR', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .layer-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .layer-btn.active { border-color: currentColor; background: rgba(255, 255, 255, 0.1); }
        .layer-btn:not(.active) { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 mb-2">신학 전쟁 지형도 v2.0: 레이어 시스템</h1>
            <p class="text-slate-500 italic">계시(Revelation)의 다섯 레이어를 직접 겹쳐보고 분석하십시오.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar: Layer Selector -->
            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="glass-card p-6">
                    <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-6">학자 레이어 선택</h2>
                    <div id="layerSelector" class="space-y-3">
                        <!-- Buttons will be generated by JS -->
                    </div>
                    <div class="mt-8 pt-6 border-t border-slate-800">
                        <button onclick="toggleAll(true)" class="text-xs text-sky-400 hover:text-sky-300 mr-4">모두 활성</button>
                        <button onclick="toggleAll(false)" class="text-xs text-slate-500 hover:text-slate-400">모두 해제</button>
                    </div>
                </div>
            </div>

            <!-- Main: Radar Chart -->
            <div class="lg:col-span-6 glass-card p-8 flex items-center justify-center min-h-[500px] relative">
                <canvas id="radarChart"></canvas>
            </div>

            <!-- Dynamic Insights -->
            <div class="lg:col-span-3">
                <div class="glass-card p-6 h-full">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <span id="insightIcon" class="text-cyan-400">💡</span> 전략 분석
                    </h2>
                    <div id="dynamicInsight" class="text-slate-300 text-sm leading-relaxed space-y-4">
                        <!-- Content updated by JS -->
                        지도를 클릭하여 비교할 학자를 선택하십시오.
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            <p>powered by 케리그마출판사 | <a href="https://kerygma.co.kr" class="hover:text-blue-400">Visit Website</a></p>
        </footer>
    </div>

    <script>
        const scholars = [
            { id: 0, name: '아우구스티누스', color: '#38bdf8', data: [7, 6, 6, 8, 10, 7, 8], quote: "하나님은 우리의 지성이 볼 수 있게 하는 빛이다." },
            { id: 1, name: '판넨베르크', color: '#34d399', data: [10, 5, 9, 4, 3, 8, 4], quote: "계시는 역사의 끝에서 드러나는 보편적 사건이다." },
            { id: 2, name: '루터', color: '#f87171', data: [8, 8, 2, 9, 9, 10, 10], quote: "십자가의 신학자는 고난 안에서 하나님을 본다." },
            { id: 3, name: '본회퍼', color: '#a855f7', data: [9, 4, 3, 8, 6, 10, 7], quote: "그리스도는 타자를 위한 존재로 오늘 우리 곁에 계신다." },
            { id: 4, name: '루이스', color: '#fbbf24', data: [7, 7, 8, 7, 5, 7, 6], quote: "기독교는 마치 태양과 같이, 다른 모든 것을 보게 한다." }
        ];

        let activeLayers = [true, true, true, true, true];
        let chart;

        const ctx = document.getElementById('radarChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['역사적 매개성', '언어적 명제성', '자연신학 가능성', '실존적 수용성', '성령의 조명', '기독론적 집중', '종말론적 은폐'],
                    datasets: scholars.map((s, idx) => ({
                        label: s.name,
                        data: s.data,
                        borderColor: s.color,
                        backgroundColor: s.color + '22',
                        fill: true,
                        hidden: !activeLayers[idx],
                        pointRadius: 4,
                        borderWidth: activeLayers.filter(v => v).length === 1 ? 4 : 2
                    }))
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            pointLabels: { color: '#64748b', font: { size: 11, weight: '600' } },
                            ticks: { display: false, max: 10, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            renderUI();
            updateInsight();
        }

        function renderUI() {
            const container = document.getElementById('layerSelector');
            container.innerHTML = scholars.map((s, idx) => `
                <button onclick="toggleLayer(${idx})" 
                        class="layer-btn w-full flex items-center gap-3 p-3 rounded-xl border border-slate-800 text-left text-sm ${activeLayers[idx] ? 'active' : ''}" 
                        style="color: ${s.color}">
                    <div class="w-3 h-3 rounded-full" style="background-color: ${s.color}"></div>
                    <span class="flex-1 font-medium text-slate-200">${s.name}</span>
                    ${activeLayers[idx] ? '<span class="text-[10px] bg-slate-800 px-2 py-1 rounded">ON</span>' : ''}
                </button>
            `).join('');
        }

        function toggleLayer(idx) {
            activeLayers[idx] = !activeLayers[idx];
            chart.data.datasets[idx].hidden = !activeLayers[idx];
            chart.update();
            renderUI();
            updateInsight();
        }

        function toggleAll(val) {
            activeLayers = activeLayers.map(() => val);
            chart.data.datasets.forEach(d => d.hidden = !val);
            chart.update();
            renderUI();
            updateInsight();
        }

        function updateInsight() {
            const activeCount = activeLayers.filter(v => v).length;
            const content = document.getElementById('dynamicInsight');
            const icon = document.getElementById('insightIcon');

            if (activeCount === 0) {
                content.innerHTML = "학자 레이어를 선택하여 분석을 시작하십시오.";
                return;
            }

            if (activeCount === 1) {
                const s = scholars[activeLayers.indexOf(true)];
                icon.innerText = "🧐";
                content.innerHTML = `
                    <p class="text-sky-400 font-bold text-lg">${s.name}의 시그니처</p>
                    <p class="italic border-l-2 border-slate-700 pl-4 py-2 my-4 text-slate-400">"${s.quote}"</p>
                    <p>이 지형도에서 가장 두드러진 지점은 <strong>'${chart.data.labels[s.data.indexOf(Math.max(...s.data))]}'</strong>(${Math.max(...s.data)}점)입니다.</p>
                `;
            } else {
                icon.innerText = "⚔️";
                content.innerHTML = `<p class="font-bold border-b border-slate-800 pb-2 mb-4">${activeCount}명의 신학적 격전지</p>`;
                
                // 간단한 비교 로직
                if (activeLayers[1] && activeLayers[2]) { // 판넨베르크 vs 루터
                    content.innerHTML += `<p><strong class="text-red-400">루터 vs 판넨베르크:</strong> 역사적 낙관주의와 십자가의 역설이 정면으로 충돌합니다. 계시가 '다 보이는 사건'인지 '숨어있는 사건'인지가 핵심입니다.</p>`;
                }
                if (activeLayers[3] && activeLayers[4]) {
                    content.innerHTML += `<p><strong class="text-amber-400">루이스 vs 본회퍼:</strong> 보편적 이성의 흔적(자연계시)을 찾으려는 루이스와 오직 타자를 위한 구체적 현존을 강조하는 본회퍼의 실천적 차이가 보입니다.</p>`;
                }
            }
        }

        initChart();
    </script>
</body>
</html>
