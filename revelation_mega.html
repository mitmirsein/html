<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계시(Revelation) 메가 지형도 v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans KR', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .layer-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .layer-btn.active { border-color: currentColor; background: rgba(255, 255, 255, 0.1); }
        .layer-btn:not(.active) { opacity: 0.3; filter: grayscale(1); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-rose-500 mb-2">신학 전쟁 지형도 v2.1: 메가 레이어</h1>
            <p class="text-slate-500 italic">계시(Revelation)의 7가지 레이어. 현대 신학의 거장들이 합류했습니다.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Sidebar: Layer Selector -->
            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="glass-card p-6">
                    <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-6">학자 레이어 선택</h2>
                    <div id="layerSelector" class="space-y-2 overflow-y-auto max-h-[500px] pr-2">
                        <!-- Buttons will be generated by JS -->
                    </div>
                    <div class="mt-6 pt-4 border-t border-slate-800 flex justify-between">
                        <button onclick="toggleAll(true)" class="text-[10px] text-sky-400 font-bold uppercase">전체 전개</button>
                        <button onclick="toggleAll(false)" class="text-[10px] text-slate-500 font-bold uppercase">전체 후퇴</button>
                    </div>
                </div>
            </div>

            <!-- Main: Radar Chart -->
            <div class="lg:col-span-6 glass-card p-8 flex items-center justify-center min-h-[550px] relative">
                <canvas id="radarChart"></canvas>
            </div>

            <!-- Dynamic Insights -->
            <div class="lg:col-span-3">
                <div class="glass-card p-6 h-full flex flex-col">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <span id="insightIcon" class="text-orange-400">🔥</span> 전략 분석
                    </h2>
                    <div id="dynamicInsight" class="text-slate-300 text-sm leading-relaxed space-y-4 flex-1 overflow-y-auto pr-2">
                        레이어를 선택하여 신학적 격전을 분석하십시오.
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            <p>powered by 케리그마출판사 | <a href="https://kerygma.co.kr" class="hover:text-rose-400 transition-colors">Visit Website</a></p>
        </footer>
    </div>

    <script>
        const scholars = [
            { id: 0, name: '아우구스티누스', color: '#38bdf8', data: [7, 6, 6, 8, 10, 7, 8], quote: "하나님은 우리의 지성이 볼 수 있게 하는 빛이다." },
            { id: 1, name: '판넨베르크', color: '#10b981', data: [10, 5, 9, 4, 3, 8, 4], quote: "계시는 역사의 끝에서 드러나는 보편적 사건이다." },
            { id: 2, name: '루터', color: '#ef4444', data: [8, 8, 2, 9, 9, 10, 10], quote: "십자가의 신학자는 고난 안에서 하나님을 본다." },
            { id: 3, name: '본회퍼', color: '#a855f7', data: [9, 4, 3, 8, 6, 10, 7], quote: "그리스도는 타자를 위한 존재로 오늘 우리 곁에 계신다." },
            { id: 4, name: '루이스', color: '#f59e0b', data: [7, 7, 8, 7, 5, 7, 6], quote: "기독교는 마치 태양과 같이, 다른 모든 것을 보게 한다." },
            { id: 5, name: '바르트', color: '#ec4899', data: [5, 7, 0, 8, 10, 10, 9], quote: "하나님은 전적으로 타자이시며, 인간에게 '예'와 '아니오'로 오신다." },
            { id: 6, name: '불트만', color: '#64748b', data: [2, 3, 4, 10, 8, 8, 7], quote: "계시는 지금 여기에서 나에게 일어나는 실존적 사건이다." }
        ];

        let activeLayers = [true, true, true, true, true, true, true];
        let chart;

        const ctx = document.getElementById('radarChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['역사적 매개성', '언어적 명제성', '자연신학 가능성', '실존적 수용성', '성령의 조명', '기독론적 집중', '종말론적 은폐'],
                    datasets: scholars.map((s, idx) => ({
                        label: s.name,
                        data: s.data,
                        borderColor: s.color,
                        backgroundColor: s.color + '18',
                        fill: true,
                        hidden: !activeLayers[idx],
                        pointRadius: 3,
                        borderWidth: 2
                    }))
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            pointLabels: { color: '#94a3b8', font: { size: 10, weight: '600' } },
                            ticks: { display: false, max: 10, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            renderUI();
            updateInsight();
        }

        function renderUI() {
            const container = document.getElementById('layerSelector');
            container.innerHTML = scholars.map((s, idx) => `
                <button onclick="toggleLayer(${idx})" 
                        class="layer-btn w-full flex items-center gap-3 p-3 rounded-xl border border-slate-800 text-left text-xs ${activeLayers[idx] ? 'active' : ''}" 
                        style="color: ${s.color}">
                    <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${s.color}"></div>
                    <span class="flex-1 font-medium text-slate-200">${s.name}</span>
                    ${activeLayers[idx] ? '<span class="text-[8px] bg-slate-800 px-1.5 py-0.5 rounded opacity-70">DEPLOYED</span>' : ''}
                </button>
            `).join('');
        }

        function toggleLayer(idx) {
            activeLayers[idx] = !activeLayers[idx];
            chart.data.datasets[idx].hidden = !activeLayers[idx];
            chart.update();
            renderUI();
            updateInsight();
        }

        function toggleAll(val) {
            activeLayers = activeLayers.map(() => val);
            chart.data.datasets.forEach(d => d.hidden = !val);
            chart.update();
            renderUI();
            updateInsight();
        }

        function updateInsight() {
            const activeCount = activeLayers.filter(v => v).length;
            const content = document.getElementById('dynamicInsight');
            const icon = document.getElementById('insightIcon');

            if (activeCount === 0) {
                content.innerHTML = "참전할 학자 레이어를 선택하십시오.";
                return;
            }

            if (activeCount === 1) {
                const s = scholars[activeLayers.indexOf(true)];
                icon.innerText = "🧐";
                content.innerHTML = `
                    <div class="p-4 rounded-xl bg-slate-900/50 border border-slate-800">
                        <p class="text-rose-400 font-bold text-lg mb-2">${s.name}</p>
                        <p class="italic text-slate-500 text-xs">"${s.quote}"</p>
                    </div>
                `;
            } else {
                icon.innerText = "⚔️";
                let html = `<p class="font-bold text-xs uppercase text-slate-500 tracking-wider mb-4 border-b border-slate-800 pb-2">${activeCount}명의 신학적 전투 상황</p>`;
                
                if (activeLayers[1] && activeLayers[5]) {
                    html += `<div class="p-3 rounded-lg bg-emerald-900/10 border-l-4 border-emerald-500 mb-3"><p><strong class="text-emerald-400">역사 vs 말씀:</strong> 판넨베르크의 '역사로서의 계시'와 바르트의 '수직적 말씀'이 축 1번에서 정면 충돌합니다.</p></div>`;
                }
                if (activeLayers[5] && activeLayers[6]) {
                    html += `<div class="p-3 rounded-lg bg-pink-900/10 border-l-4 border-pink-500 mb-3"><p><strong class="text-pink-400">동반자이자 라이벌:</strong> 바르트와 불트만은 '실존적 수용성'에서 겹치지만, 역사적 기초를 두느냐 완전히 걷어내느냐에서 격렬히 갈립니다.</p></div>`;
                }
                if (activeLayers[5] && activeLayers[2]) {
                    html += `<div class="p-3 rounded-lg bg-rose-900/10 border-l-4 border-rose-500 mb-3"><p><strong class="text-rose-400">신정통주의와 종교개혁:</strong> 바르트와 루터는 기독론적 집중도(10점)에서 완벽한 일치를 보이며 이 차트의 왼쪽을 장악합니다.</p></div>`;
                }

                content.innerHTML = html;
            }
        }

        initChart();
    </script>
</body>
</html>
